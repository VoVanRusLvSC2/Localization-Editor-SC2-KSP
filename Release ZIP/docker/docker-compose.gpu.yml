services:
  libretranslate-gpu:
    image: libretranslate/libretranslate:latest-cuda
    container_name: libretranslate-gpu
    ports:
      - "127.0.0.1:5001:5000"
    restart: unless-stopped
    environment:
      - LT_LOAD_ONLY=en,ru,de,es,fr,it,pl,pt,ko,zh,zt
    volumes:
      - libretranslate_models_gpu:/home/libretranslate/.local
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  libretranslate_models_gpu:
